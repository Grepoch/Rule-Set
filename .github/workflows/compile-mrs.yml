name: Compile to MRS

on:
  push:
    branches: [main]
    paths:
      - 'domain/**'
      - 'ipcidr/**'
      - '.github/workflows/compile-mrs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mihomo
        run: |
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.tag_name')
          echo "mihomo version: $MIHOMO_VERSION"
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo

      - name: Compile domain rules to mrs
        run: |
          mkdir -p mrs
          for f in domain/*.list; do
            if [ -f "$f" ]; then
              name=$(basename "$f" .list)
              echo "Compiling $f -> mrs/$name.mrs"
              ./mihomo convert-ruleset domain text "$f" "mrs/$name.mrs"
            fi
          done

      - name: Compile ipcidr rules to mrs
        run: |
          if [ -d "ipcidr" ]; then
            for f in ipcidr/*.list; do
              if [ -f "$f" ]; then
                name=$(basename "$f" .list)
                echo "Compiling $f -> mrs/$name.mrs"
                ./mihomo convert-ruleset ipcidr text "$f" "mrs/$name.mrs"
              fi
            done
          fi

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mrs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-compile mrs files [skip ci]"
            git push
          fi
