name: Compile to MRS

on:
  push:
    branches: [main]
    paths:
      - 'mihomo/**/*.list'
      - '.github/workflows/compile-mrs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mihomo
        run: |
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.tag_name')
          echo "mihomo version: $MIHOMO_VERSION"
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo

      - name: Compile .list to .mrs
        run: |
          find mihomo -name "*.list" | while read f; do
            dir=$(dirname "$f")
            name=$(basename "$f" .list)
            output="${dir}/${name}.mrs"
            echo "Compiling $f -> $output"
            ./mihomo convert-ruleset domain text "$f" "$output"
          done

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mihomo/**/*.mrs
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-compile mrs files [skip ci]"
            git push
          fi
